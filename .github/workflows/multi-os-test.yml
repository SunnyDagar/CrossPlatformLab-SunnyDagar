name: Multi-OS Testing - Sunny Dagar

# Trigger on every push to the main branch
on:
  push:
    branches:
      - main

jobs:
  # ---------- Job 1: Ubuntu ----------
  test-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - name: Print start message
        run: echo "Testing on Ubuntu..."

      - name: Hold for parallel visibility
        run: sleep 35

      - name: Display OS information
        run: uname -a

      - name: Create test file
        run: echo "Ubuntu test by Sunny Dagar" > test-ubuntu.txt

      - name: Display file contents
        run: cat test-ubuntu.txt

      - name: Print completion message
        run: echo "Ubuntu tests completed"

  # ---------- Job 2: Windows ----------
  test-windows:
    runs-on: windows-latest
    steps:
      - name: Print start message
        run: Write-Host "Testing on Windows..."

      - name: Hold for parallel visibility
        run: Start-Sleep -Seconds 35

      - name: Display OS information
        run: Get-CimInstance Win32_OperatingSystem | Select-Object Caption, Version, OSArchitecture

      - name: Create test file
        run: Set-Content -Path test-windows.txt -Value "Windows test by Sunny Dagar"

      - name: Display file contents
        run: Get-Content test-windows.txt

      - name: Print completion message
        run: Write-Host "Windows tests completed"
